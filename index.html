<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health Self-Check Kiosk</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <h1>🩺 Health Self-Check Kiosk</h1>
    <p>Quick, private BMI check and wellness tips</p>
  </header>

  <main>
    <section class="form-section">
      <form id="bmiForm" novalidate>
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="Juan Dela Cruz" required>
          <span class="error-msg" id="nameError"></span>
        </div>

        <div class="form-group">
          <label for="age">Age</label>
          <input type="number" id="age" min="1" max="120" placeholder="20" required>
          <span class="error-msg" id="ageError"></span>
        </div>

        <div class="form-group">
          <label for="sex">Sex</label>
          <select id="sex" required>
            <option value="">Select</option>
            <option value="Female">Female</option>
            <option value="Male">Male</option>
          </select>
          <span class="error-msg" id="sexError"></span>
        </div>

        <div class="form-group">
          <label for="weight">Weight (kg)</label>
          <input type="number" id="weight" min="1" step="0.1" placeholder="60" required>
          <span class="error-msg" id="weightError"></span>
        </div>

        <div class="form-group">
          <label for="height">Height (cm)</label>
          <input type="number" id="height" min="1" step="0.1" placeholder="165" required>
          <span class="error-msg" id="heightError"></span>
        </div>

        <button type="submit" id="submitBtn">Check My BMI</button>
      </form>
    </section>

    <section id="resultCard" class="result-card hidden">
      <h2 id="resultCategory"></h2>
      <p id="resultBMI"></p>
      <p id="resultMessage"></p>
    </section>

    <section class="history-section">
      <h3>Recent Submissions (this session)</h3>
      <ul id="historyList"></ul>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Health Self-Check Kiosk | For informational purposes only. Consult a healthcare provider for medical advice.</p>
  </footer>

<script src="script.js"></script>
</body>
</html>
